<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- displays site properly based on user's device -->

		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./assets/images/favicon-32x32.png"
		/>
		<link rel="stylesheet" href="index.css" />

		<title>Frontend Mentor | Social links profile</title>
	</head>
	<body>
		<main class="main">
			<div class="container">
				<img
					class="avatar"
					src="./assets/images/avatar-jessica.jpeg"
					alt="avatar-jessica"
				/>
				<h1 class="heading">Jessica Randall</h1>
				<p class="location">London, United Kingdom</p>
				<p class="title">"Front-end developer and avid reader."</p>
				<a class="link" href="#">
					<div>GitHub</div>
				</a>
				<a class="link" href="#">
					<div>Frontend Mentor</div>
				</a>
				<a class="link" href="#">
					<div>LinkedIn</div>
				</a>
				<a class="link" href="#">
					<div>Twitter</div>
				</a>
				<a class="link" href="#">
					<div>Instagram</div>
				</a>
			</div>
		</main>

		<div class="attribution">
			Challenge by
			<a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
				>Frontend Mentor</a
			>. Coded by <a href="#">Aske Lysgaard</a>.
		</div>
	</body>
</html>
